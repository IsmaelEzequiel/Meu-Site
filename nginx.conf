server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/xml image/svg+xml;

  # API → backend (assumes the server container is reachable as `server:4000`
  # on the Docker network, e.g. via docker-compose service name).
  location /api/ {
    proxy_pass http://server:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Uploaded files served by the backend.
  location /uploads/ {
    proxy_pass http://server:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Long-cache hashed Vite build assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Don't cache HTML so deploys are picked up immediately.
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-store, must-revalidate";
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
